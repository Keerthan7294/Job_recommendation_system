<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobVerse - Your Gateway to Build Careers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header style="display: flex; justify-content: space-between; align-items: center; text-align: left;">
            <div>
                <h1 style="margin-bottom: 0;">JobVerse<span class="badge">PRO</span></h1>
                <p>Find your next role with zero typing.</p>
            </div>
            <button id="logoutBtn"
                style="padding: 0.5rem 1rem; border: none; border-radius: 8px; background-color: #d94f4f; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s ease;">Logout</button>
        </header>

        <main>
            <section class="profile-section">
                <div class="glass-card">
                    <h2>Your Profile</h2>
                    <form id="matchForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="degree">Degree</label>
                                <select id="degree" name="degree" required>
                                    <option value="" disabled selected>Select Degree</option>
                                    <option value="Bachelors">Bachelors</option>
                                    <option value="Masters">Masters</option>
                                    <option value="PhD">PhD</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="cgpa">CGPA <span class="range-hint">(Adjust via arrows)</span></label>
                                <input type="number" id="cgpa" name="cgpa" min="0" max="10" step="0.1" value="8.0"
                                    required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label><span class="highlight-text">Projects</span> (Select keywords)</label>
                            <div class="tags-container" id="projectsTags">
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Python"><span>Python</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="SQL"><span>SQL</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Node.js"><span>Node.js</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="React"><span>React</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="API"><span>API</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Microservices"><span>Microservices</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="System Design"><span>System Design</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Database"><span>Database</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Authentication"><span>Authentication</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Recommendation"><span>Recommendation</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Computer Vision"><span>Computer Vision</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Neural Network"><span>Neural Network</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Classification"><span>Classification</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="projects"
                                        value="Data Visualization"><span>Data Visualization</span></label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label><span class="highlight-text">Internships</span> (Select keywords)</label>
                            <div class="tags-container" id="internshipsTags">
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="AI"><span>AI</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="NLP"><span>NLP</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="Express"><span>Express</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="MongoDB"><span>MongoDB</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="Java"><span>Java</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="Machine Learning"><span>Machine Learning</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="Deep Learning"><span>Deep Learning</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="TensorFlow"><span>TensorFlow</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="PyTorch"><span>PyTorch</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="Data Analysis"><span>Data Analysis</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="Statistics"><span>Statistics</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="Model Evaluation"><span>Model Evaluation</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="A/B Testing"><span>A/B Testing</span></label>
                                <label class="tag-checkbox"><input type="checkbox" name="internships"
                                        value="Metrics"><span>Metrics</span></label>
                            </div>
                        </div>

                        <button type="submit" class="submit-btn" id="findMatchesBtn">Find Matches</button>
                    </form>
                </div>
            </section>

            <section class="results-section">
                <h2>Matched Jobs</h2>
                <div id="results" class="results-grid">
                    <div class="empty-state">
                        <p>Submit your profile to see matched jobs.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
